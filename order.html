<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Order - SamsonVentures</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

    <header>
        <h1>Place Your Order</h1>
        <p>Fill the form below to order groceries</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="order.html">Order</a>
    </nav>

    <div class="container">

        <form onsubmit="submitOrder(event)">
            <label>Full Name:</label>
            <input type="text" placeholder="Enter your full name" required>

            <label>Email Address:</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Phone Number:</label>
            <input type="text" placeholder="Enter your phone number" required>

            <label>Delivery Address:</label>
            <textarea placeholder="Enter your delivery address" required></textarea>

            <label>Items You Want to Order:</label>
            <textarea placeholder="Example: Rice 5kg, Eggs crate, Milk Peak..." required></textarea>

            <button type="submit">Submit Order</button>
        </form>

    </div>

    <!-- <footer>
        <p>SamsonVentures © 2026</p>
    </footer> -->

</body>
</html>
